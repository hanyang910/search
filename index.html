<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市車旅場站資料搜尋工具</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 24px 12px; color: #1a202c; }
    .container { max-width: 900px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 22px; font-weight: 700; color: #1a202c; }
    header p { color: #718096; margin-top: 5px; font-size: 13px; }

    .switcher { display: flex; gap: 8px; margin-bottom: 16px; background: white; border-radius: 12px; padding: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .switch-btn { flex: 1; padding: 10px 8px; border: none; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; background: transparent; color: #718096; text-align: center; line-height: 1.4; }
    .switch-btn.active { background: #3182ce; color: white; box-shadow: 0 2px 8px rgba(49,130,206,0.3); }
    .switch-btn:not(.active):hover { background: #f0f4f8; color: #2d3748; }

    .sheet-tabs { display: none; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .sheet-tabs.show { display: flex; }
    .sheet-tab { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; border: 1.5px solid #e2e8f0; background: white; color: #4a5568; transition: all 0.15s; white-space: nowrap; }
    .sheet-tab.active { background: #ebf8ff; border-color: #4299e1; color: #2b6cb0; }
    .sheet-tab:hover { border-color: #bee3f8; background: #f0f9ff; }
    .sheet-tab.combined { border-color: #9f7aea; color: #6b46c1; background: #faf5ff; }
    .sheet-tab.combined.active { background: #e9d8fd; border-color: #9f7aea; color: #553c9a; }

    .card { background: white; border-radius: 14px; padding: 18px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; }

    .btn { padding: 10px 20px; border: none; border-radius: 9px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #3182ce; color: white; width: 100%; padding: 12px; font-size: 15px; margin-top: 10px; }
    .btn-primary:hover { background: #2b6cb0; }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; }
    .btn-outline { background: white; border: 1px solid #e2e8f0; color: #4a5568; }
    .btn-outline:hover { background: #f7fafc; }

    .search-input { width: 100%; padding: 12px 16px; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: border-color 0.2s; color: #2d3748; }
    .search-input:focus { border-color: #4299e1; }
    .search-input::placeholder { color: #a0aec0; }
    .search-input:disabled { background: #f7fafc; }

    .status { margin-top: 10px; font-size: 13px; color: #718096; min-height: 18px; text-align: center; }
    .status.error { color: #e53e3e; }
    .status.success { color: #38a169; }

    .col-selector { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
    .col-selector h4 { font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .col-actions { display: flex; gap: 6px; }
    .col-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
    @media (max-width: 600px) { .col-grid { grid-template-columns: repeat(4, 1fr); } }
    .col-chip { display: flex; align-items: center; justify-content: center; padding: 7px 4px; border-radius: 8px; font-size: 12px; border: 1.5px solid #e2e8f0; background: white; cursor: pointer; transition: all 0.15s; user-select: none; color: #4a5568; text-align: center; line-height: 1.3; min-height: 40px; word-break: break-all; }
    .col-chip.active { background: #ebf8ff; border-color: #4299e1; color: #2b6cb0; font-weight: 500; }
    .col-chip:hover { border-color: #bee3f8; background: #f0f9ff; }
    .col-chip.active:hover { background: #dbeafe; }

    .results-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; display: none; }
    .results-header { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .results-header h3 { font-size: 14px; font-weight: 600; color: #2d3748; }
    .results-header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .count-badge { background: #ebf8ff; color: #2b6cb0; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .legend { display: flex; gap: 8px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #718096; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .legend-dot.undone  { background: #fefce8; border: 1px solid #fde047; }
    .legend-dot.done    { background: #eff6ff; border: 1px solid #bfdbfe; }
    .legend-dot.history { background: white;   border: 1px solid #e2e8f0; }

    .pagination-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding: 10px 16px; border-top: 1px solid #e2e8f0; background: #fafafa; }
    .per-page-group { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #4a5568; }
    .per-page-btn { padding: 4px 10px; font-size: 12px; border-radius: 6px; border: 1.5px solid #e2e8f0; background: white; color: #4a5568; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; }
    .per-page-btn.active { background: #3182ce; border-color: #3182ce; color: white; font-weight: 600; }
    .per-page-btn:not(.active):hover { background: #f0f4f8; }
    .page-nav { display: flex; align-items: center; gap: 4px; }
    .page-btn { padding: 5px 10px; font-size: 12px; border-radius: 6px; border: 1.5px solid #e2e8f0; background: white; color: #4a5568; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all 0.15s; min-width: 32px; text-align: center; }
    .page-btn.active { background: #3182ce; border-color: #3182ce; color: white; font-weight: 600; }
    .page-btn:not(.active):hover { background: #f0f4f8; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; background: white; }
    .page-info { font-size: 12px; color: #718096; white-space: nowrap; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: #f7fafc; padding: 9px 12px; text-align: left; font-weight: 600; font-size: 12px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    thead th.sort-col { color: #2b6cb0; }
    thead th.sort-col::after { content: ' ↓'; font-size: 11px; }
    tbody tr { transition: filter 0.1s; }
    tbody tr:hover { filter: brightness(0.96); }
    tbody tr.row-undone  td { background: #fefce8; }
    tbody tr.row-done    td { background: #eff6ff; }
    tbody tr.row-history td { background: white; }
    tbody td { padding: 9px 12px; border-bottom: 1px solid rgba(0,0,0,0.06); color: #2d3748; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; }
    tbody tr:last-child td { border-bottom: none; }
    mark { background: #fde68a; color: #92400e; border-radius: 2px; padding: 0 2px; }
    .empty-state { text-align: center; padding: 40px; color: #a0aec0; }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .click-hint { font-size: 11px; color: #a0aec0; text-align: center; padding: 8px; }
    .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid #e2e8f0; border-top-color: #3182ce; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .popup-overlay.show { display: flex; }
    .popup-box { background: white; border-radius: 14px; padding: 20px; width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .popup-label { font-size: 12px; font-weight: 600; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .popup-content { font-size: 15px; color: #1a202c; line-height: 1.6; word-break: break-all; background: #f7fafc; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; min-height: 48px; white-space: pre-wrap; }
    .popup-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-copy { background: #3182ce; color: white; padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; }
    .btn-copy:hover { background: #2b6cb0; }
    .btn-copy.copied { background: #38a169; }
    .btn-close-popup { background: #f7fafc; color: #4a5568; padding: 8px 18px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; }
    .btn-close-popup:hover { background: #edf2f7; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>🚌 城市車旅場站資料搜尋工具</h1>
    <p>快速搜尋 Google 試算表中的任何資料</p>
  </header>

  <div class="switcher">
    <button class="switch-btn active" onclick="switchSheet('station')">📊 場站總表</button>
    <button class="switch-btn" onclick="switchSheet('repair')">🔧 報修系統</button>
  </div>

  <div class="sheet-tabs" id="repairTabs">
    <div class="sheet-tab" data-type="single" data-sheet="阜爾報修(未完成)">阜爾報修(未完成)</div>
    <div class="sheet-tab" data-type="single" data-sheet="中控叫修(未完成)">中控叫修(未完成)</div>
    <div class="sheet-tab" data-type="single" data-sheet="阜爾報修(當日完成)">阜爾報修(當日完成)</div>
    <div class="sheet-tab" data-type="single" data-sheet="中控報修(當日完成)">中控報修(當日完成)</div>
    <div class="sheet-tab" data-type="single" data-sheet="阜爾報修(歷史留存)">阜爾報修(歷史留存)</div>
    <div class="sheet-tab" data-type="single" data-sheet="中控報修(歷史留存)">中控報修(歷史留存)</div>
    <div class="sheet-tab" data-type="single" data-sheet="阜爾報修(切換歷史留存)">阜爾報修(切換歷史留存)</div>
    <div class="sheet-tab" data-type="single" data-sheet="中控叫修(切換歷史留存)">中控叫修(切換歷史留存)</div>
    <div class="sheet-tab combined" data-type="combined" data-group="阜爾">🔀 阜爾彙總</div>
    <div class="sheet-tab combined" data-type="combined" data-group="中控">🔀 中控彙總</div>
  </div>

  <div class="card">
    <div class="col-selector" id="colSelector">
      <h4>
        顯示欄位（選好後再按搜尋）
        <span class="col-actions">
          <button class="btn btn-sm btn-outline" onclick="selectAll()">全選</button>
          <button class="btn btn-sm btn-outline" onclick="selectNone()">全不選</button>
        </span>
      </h4>
      <div class="col-grid" id="colGrid"></div>
    </div>
    <div style="margin-top:16px">
      <input class="search-input" type="text" id="keyword"
        placeholder="輸入關鍵字搜尋..." onkeydown="if(event.key==='Enter') doSearch()" disabled>
      <button class="btn btn-primary" id="searchBtn" onclick="doSearch()" disabled>搜尋</button>
      <div class="status" id="status">請點上方按鈕選擇試算表，系統會自動載入</div>
    </div>
  </div>

  <div class="results-card" id="resultsCard">
    <div class="results-header">
      <h3>搜尋結果</h3>
      <div class="results-header-right">
        <div class="legend" id="legend" style="display:none">
          <div class="legend-item"><div class="legend-dot undone"></div>未完成</div>
          <div class="legend-item"><div class="legend-dot done"></div>當日完成</div>
          <div class="legend-item"><div class="legend-dot history"></div>歷史留存</div>
        </div>
        <span class="count-badge" id="countBadge">0 筆</span>
      </div>
    </div>
    <div class="table-wrap" id="tableWrap"></div>
    <div class="pagination-bar" id="paginationBar" style="display:none">
      <div class="per-page-group">
        每頁
        <button class="per-page-btn active" onclick="setPerPage(30)">30</button>
        <button class="per-page-btn" onclick="setPerPage(50)">50</button>
        <button class="per-page-btn" onclick="setPerPage(100)">100</button>
        筆
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="page-info" id="pageInfo"></span>
        <div class="page-nav" id="pageNav"></div>
      </div>
    </div>
    <div class="click-hint">點擊任意欄位可查看完整內容並複製</div>
  </div>
</div>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <div class="popup-label" id="popupLabel"></div>
    <div class="popup-content" id="popupContent"></div>
    <div class="popup-actions">
      <button class="btn-close-popup" onclick="closePopupDirect()">關閉</button>
      <button class="btn-copy" id="copyBtn" onclick="copyContent()">複製</button>
    </div>
  </div>
</div>

<script>
  const SHEET_ID_STATION = '1gq0qZzwbKZY7uLzpKwEmcFAr4D3SUttcTwWqkaOTAKY';
  const SHEET_ID_REPAIR  = '1Lq0ZoG9s4iNqNeBJcpQGhjQV9ZqIBVeEqe9LcZWjkCI';
  const STATION_DEFAULT_COLS = ['公司','場地代號','縣市','區域','淡大名稱','場地地址','派工保全'];
  const FUER_FIELD_MAP = { '時間戳記':'日期/時間', '場地代號':'場代', '場站名稱':'場站', '區域':'地區' };
  const FUER_DEFAULT_COLS = ['日期/時間','地區','場代','場站','問題描述','報修人','聯絡電話','回覆業主','回覆人','回覆內容','PASS','PASS人','PASS備註','處理人','處理結果&備註'];
  const COMBINED_SHEETS = {
    '阜爾': [
      { name: '阜爾報修(未完成)',   type: 'undone'  },
      { name: '阜爾報修(當日完成)', type: 'done'    },
      { name: '阜爾報修(歷史留存)', type: 'history' },
    ],
    '中控': [
      { name: '中控叫修(未完成)',   type: 'undone'  },
      { name: '中控報修(當日完成)', type: 'done'    },
      { name: '中控報修(歷史留存)', type: 'history' },
    ],
  };

  // 日期欄位名稱（依優先順序嘗試）
  const DATE_COLS = ['日期/時間', '時間戳記', '日期', '時間'];

  let currentMode = 'station';
  let currentTabType = 'single';
  let currentGroup = '';
  let allData = [], headers = [], activeHeaders = new Set();
  let filteredData = [];
  let currentPage = 1;
  let perPage = 30;
  let currentKw = '';
  let currentCopyText = '';

  document.querySelectorAll('.sheet-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTabType = tab.dataset.type;
      resetResults();
      if (currentTabType === 'single') {
        loadSingleSheet(SHEET_ID_REPAIR, tab.dataset.sheet, []);
      } else {
        currentGroup = tab.dataset.group;
        loadCombinedSheets(currentGroup);
      }
    });
  });

  document.getElementById('popupOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePopupDirect();
  });

  document.getElementById('tableWrap').addEventListener('click', function(e) {
    const td = e.target.closest('td');
    if (!td) return;
    openPopup(td.dataset.label || '', td.dataset.value || '');
  });

  window.onload = () => switchSheet('station');

  function switchSheet(mode) {
    currentMode = mode;
    document.querySelectorAll('.switch-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && mode === 'station') || (i === 1 && mode === 'repair'));
    });
    document.getElementById('repairTabs').classList.toggle('show', mode === 'repair');
    resetResults();
    if (mode === 'station') {
      loadSingleSheet(SHEET_ID_STATION, '總表', STATION_DEFAULT_COLS);
    } else {
      const firstTab = document.querySelector('.sheet-tab');
      document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
      firstTab.classList.add('active');
      currentTabType = 'single';
      loadSingleSheet(SHEET_ID_REPAIR, firstTab.dataset.sheet, []);
    }
  }

  function resetResults() {
    allData = []; headers = []; activeHeaders = new Set(); filteredData = [];
    currentPage = 1; currentKw = '';
    document.getElementById('colSelector').style.display = 'none';
    document.getElementById('colGrid').innerHTML = '';
    document.getElementById('resultsCard').style.display = 'none';
    document.getElementById('legend').style.display = 'none';
    document.getElementById('paginationBar').style.display = 'none';
    document.getElementById('keyword').disabled = true;
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('keyword').value = '';
  }

  async function fetchCSV(sheetId, sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`無法讀取「${sheetName}」`);
    return res.text();
  }

  function parseCSV(text) {
    const rows = [];
    let current = '', inQuotes = false, row = [];
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (ch === '"') {
        if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) { row.push(current); current = ''; }
      else if ((ch === '\n' || ch === '\r') && !inQuotes) {
        if (current || row.length) { row.push(current); rows.push(row); }
        current = ''; row = [];
        if (ch === '\r' && text[i+1] === '\n') i++;
      } else current += ch;
    }
    if (current || row.length) { row.push(current); rows.push(row); }
    return rows;
  }

  function applyFieldMap(obj, fieldMap) {
    Object.entries(fieldMap).forEach(([src, dst]) => {
      if ((!obj[dst] || obj[dst] === '') && obj[src]) obj[dst] = obj[src];
    });
    return obj;
  }

  // 找到資料中實際存在的日期欄位
  function findDateCol(hdrs) {
    return DATE_COLS.find(c => hdrs.includes(c)) || null;
  }

  // 解析日期字串為時間戳（支援多種格式）
  function parseDate(str) {
    if (!str) return 0;
    // 嘗試直接解析
    const d = new Date(str);
    if (!isNaN(d)) return d.getTime();
    // 嘗試 yyyy/MM/dd HH:mm:ss 格式
    const m = str.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})\s*(\d{1,2})?:?(\d{1,2})?:?(\d{1,2})?/);
    if (m) return new Date(m[1], m[2]-1, m[3], m[4]||0, m[5]||0, m[6]||0).getTime();
    return 0;
  }

  // 對資料依日期欄位由新到舊排序
  function sortByDate(data, dateCol) {
    if (!dateCol) return data;
    return [...data].sort((a, b) => parseDate(b[dateCol]) - parseDate(a[dateCol]));
  }

  async function loadSingleSheet(sheetId, sheetName, defaultCols) {
    setStatus('<span class="spinner"></span>載入中...', '');
    try {
      const text = await fetchCSV(sheetId, sheetName);
      const rows = parseCSV(text);
      if (!rows.length) { setStatus('❌ 試算表是空的', 'error'); return; }
      const rawHeaders = rows[0].map(h => h.replace(/^"|"$/g, '').trim());
      const validIdx = rawHeaders.map((h, i) => h ? i : -1).filter(i => i >= 0);
      headers = validIdx.map(i => rawHeaders[i]);
      allData = rows.slice(1).map(r =>
        headers.reduce((obj, h, idx) => { obj[h] = (r[validIdx[idx]] || '').replace(/^"|"$/g, '').trim(); obj['__rowType'] = ''; return obj; }, {})
      );
      activeHeaders = defaultCols.length > 0 ? new Set(headers.filter(h => defaultCols.includes(h))) : new Set(headers);
      if (activeHeaders.size === 0) activeHeaders = new Set(headers);
      document.getElementById('legend').style.display = 'none';
      finishLoad();
    } catch(e) { setStatus('❌ ' + e.message, 'error'); }
  }

  async function loadCombinedSheets(group) {
    setStatus('<span class="spinner"></span>載入彙總資料中...', '');
    const sheets = COMBINED_SHEETS[group];
    const isFuer = group === '阜爾';
    try {
      const results = await Promise.all(sheets.map(s => fetchCSV(SHEET_ID_REPAIR, s.name)));
      let mergedHeaders = [], mergedData = [];
      results.forEach((text, i) => {
        const rows = parseCSV(text);
        if (!rows.length) return;
        const rawH = rows[0].map(h => h.replace(/^"|"$/g, '').trim());
        const validIdx = rawH.map((h, j) => h ? j : -1).filter(j => j >= 0);
        const sheetHeaders = validIdx.map(j => rawH[j]);
        sheetHeaders.forEach(h => { if (!mergedHeaders.includes(h)) mergedHeaders.push(h); });
        const rowType = sheets[i].type;
        rows.slice(1).forEach(r => {
          const obj = { __rowType: rowType };
          sheetHeaders.forEach((h, idx) => { obj[h] = (r[validIdx[idx]] || '').replace(/^"|"$/g, '').trim(); });
          if (isFuer) applyFieldMap(obj, FUER_FIELD_MAP);
          mergedData.push(obj);
        });
      });
      if (isFuer) {
        Object.values(FUER_FIELD_MAP).forEach(dst => { if (!mergedHeaders.includes(dst)) mergedHeaders.unshift(dst); });
      }
      headers = mergedHeaders;
      // 彙總頁：先依日期排序，再依狀態分組
      const order = { undone: 0, done: 1, history: 2 };
      const dateCol = findDateCol(headers);
      allData = mergedData
        .sort((a, b) => parseDate(b[dateCol]) - parseDate(a[dateCol]))
        .sort((a, b) => order[a.__rowType] - order[b.__rowType]);

      if (isFuer) {
        activeHeaders = new Set(headers.filter(h => FUER_DEFAULT_COLS.includes(h)));
        if (activeHeaders.size === 0) activeHeaders = new Set(headers);
      } else {
        activeHeaders = new Set(headers);
      }
      document.getElementById('legend').style.display = 'flex';
      finishLoad();
    } catch(e) { setStatus('❌ ' + e.message, 'error'); }
  }

  function finishLoad() {
    renderColChips();
    setStatus(`✅ 已載入 ${allData.length} 筆資料（${headers.length} 個欄位）— 選好欄位後按搜尋`, 'success');
    document.getElementById('keyword').disabled = false;
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('colSelector').style.display = 'block';
    document.getElementById('keyword').focus();
  }

  function renderColChips() {
    const grid = document.getElementById('colGrid');
    grid.innerHTML = '';
    headers.forEach(h => {
      const chip = document.createElement('div');
      chip.className = 'col-chip' + (activeHeaders.has(h) ? ' active' : '');
      chip.textContent = h;
      chip.addEventListener('click', () => {
        if (activeHeaders.has(h)) { if (activeHeaders.size <= 1) return; activeHeaders.delete(h); chip.classList.remove('active'); }
        else { activeHeaders.add(h); chip.classList.add('active'); }
      });
      grid.appendChild(chip);
    });
  }

  function selectAll() { activeHeaders = new Set(headers); renderColChips(); }
  function selectNone() { activeHeaders = new Set([headers[0]]); renderColChips(); }

  function doSearch() {
    currentKw = document.getElementById('keyword').value.trim();
    const kwLower = currentKw.toLowerCase();
    const matched = currentKw ? allData.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(kwLower))) : allData;

    // 依日期由新到舊排序（彙總頁已在載入時排序，這裡再確保單頁也排序）
    const dateCol = findDateCol(headers);
    filteredData = sortByDate(matched, dateCol);

    currentPage = 1;
    renderPage();
  }

  function setPerPage(n) {
    perPage = n;
    currentPage = 1;
    document.querySelectorAll('.per-page-btn').forEach(b => b.classList.toggle('active', parseInt(b.textContent) === n));
    renderPage();
  }

  function goToPage(p) {
    currentPage = p;
    renderPage();
    document.getElementById('resultsCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderPage() {
    const total = filteredData.length;
    const totalPages = Math.max(1, Math.ceil(total / perPage));
    if (currentPage > totalPages) currentPage = totalPages;
    const start = (currentPage - 1) * perPage;
    const pageRows = filteredData.slice(start, start + perPage);
    const visibleHeaders = headers.filter(h => activeHeaders.has(h));
    const dateCol = findDateCol(visibleHeaders);
    const wrap = document.getElementById('tableWrap');

    document.getElementById('resultsCard').style.display = 'block';
    document.getElementById('countBadge').textContent = total + ' 筆';

    if (!total) {
      wrap.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>找不到符合「${escHtml(currentKw)}」的資料</p></div>`;
      document.getElementById('paginationBar').style.display = 'none';
      return;
    }

    const tbody = document.createElement('tbody');
    pageRows.forEach(r => {
      const tr = document.createElement('tr');
      const rt = r.__rowType;
      tr.classList.add(rt === 'undone' ? 'row-undone' : rt === 'done' ? 'row-done' : 'row-history');
      visibleHeaders.forEach(h => {
        const td = document.createElement('td');
        const v = String(r[h] ?? '');
        td.dataset.label = h;
        td.dataset.value = v;
        td.innerHTML = highlight(v, currentKw);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr>' + visibleHeaders.map(h =>
      `<th class="${h === dateCol ? 'sort-col' : ''}">${escHtml(h)}</th>`
    ).join('') + '</tr>';
    table.appendChild(thead);
    table.appendChild(tbody);
    wrap.innerHTML = '';
    wrap.appendChild(table);

    document.getElementById('paginationBar').style.display = 'flex';
    document.getElementById('pageInfo').textContent = `第 ${start+1}–${Math.min(start+perPage, total)} 筆，共 ${total} 筆`;

    const nav = document.getElementById('pageNav');
    nav.innerHTML = '';
    const addBtn = (label, page, disabled, active) => {
      const b = document.createElement('button');
      b.className = 'page-btn' + (active ? ' active' : '');
      b.textContent = label;
      b.disabled = disabled;
      if (!disabled) b.onclick = () => goToPage(page);
      nav.appendChild(b);
    };
    addBtn('‹', currentPage - 1, currentPage === 1, false);
    let startP = Math.max(1, currentPage - 2);
    let endP = Math.min(totalPages, startP + 4);
    if (endP - startP < 4) startP = Math.max(1, endP - 4);
    for (let p = startP; p <= endP; p++) addBtn(p, p, false, p === currentPage);
    addBtn('›', currentPage + 1, currentPage === totalPages, false);

    setStatus(`找到 ${total} 筆符合「${escHtml(currentKw)}」的資料`, 'success');
  }

  function openPopup(label, content) {
    currentCopyText = content;
    document.getElementById('popupLabel').textContent = label;
    document.getElementById('popupContent').textContent = content || '（空白）';
    document.getElementById('copyBtn').textContent = '複製';
    document.getElementById('copyBtn').classList.remove('copied');
    document.getElementById('popupOverlay').classList.add('show');
  }

  function closePopupDirect() { document.getElementById('popupOverlay').classList.remove('show'); }

  function copyContent() {
    navigator.clipboard.writeText(currentCopyText).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '已複製！';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function highlight(text, kw) {
    if (!kw) return escHtml(text);
    return escHtml(text).replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => '<mark>' + m + '</mark>');
  }

  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.innerHTML = msg;
    el.className = 'status ' + (type || '');
  }
</script>
</body>
</html>
