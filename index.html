<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市車旅場站資料搜尋工具</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 24px 12px; color: #1a202c; }
    .container { max-width: 900px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 20px; }
    header h1 { font-size: 22px; font-weight: 700; color: #1a202c; }
    header p { color: #718096; margin-top: 5px; font-size: 13px; }

    .switcher { display: flex; gap: 8px; margin-bottom: 16px; background: white; border-radius: 12px; padding: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .switch-btn { flex: 1; padding: 10px 8px; border: none; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.2s; background: transparent; color: #718096; text-align: center; line-height: 1.4; }
    .switch-btn.active { background: #3182ce; color: white; box-shadow: 0 2px 8px rgba(49,130,206,0.3); }
    .switch-btn:not(.active):hover { background: #f0f4f8; color: #2d3748; }

    .sheet-tabs { display: none; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .sheet-tabs.show { display: flex; }
    .sheet-tab { padding: 6px 12px; border-radius: 20px; font-size: 12px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; border: 1.5px solid #e2e8f0; background: white; color: #4a5568; transition: all 0.15s; white-space: nowrap; }
    .sheet-tab.active { background: #ebf8ff; border-color: #4299e1; color: #2b6cb0; }
    .sheet-tab:hover { border-color: #bee3f8; background: #f0f9ff; }

    .card { background: white; border-radius: 14px; padding: 18px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 16px; }

    .btn { padding: 10px 20px; border: none; border-radius: 9px; font-size: 14px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #3182ce; color: white; width: 100%; padding: 12px; font-size: 15px; margin-top: 10px; }
    .btn-primary:hover { background: #2b6cb0; }
    .btn-primary:disabled { background: #a0aec0; cursor: not-allowed; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; }
    .btn-outline { background: white; border: 1px solid #e2e8f0; color: #4a5568; }
    .btn-outline:hover { background: #f7fafc; }

    .search-input { width: 100%; padding: 12px 16px; font-size: 15px; font-family: 'Noto Sans TC', sans-serif; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: border-color 0.2s; color: #2d3748; }
    .search-input:focus { border-color: #4299e1; }
    .search-input::placeholder { color: #a0aec0; }
    .search-input:disabled { background: #f7fafc; }

    .status { margin-top: 10px; font-size: 13px; color: #718096; min-height: 18px; text-align: center; }
    .status.error { color: #e53e3e; }
    .status.success { color: #38a169; }

    .col-selector { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e2e8f0; }
    .col-selector h4 { font-size: 13px; font-weight: 600; color: #4a5568; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
    .col-actions { display: flex; gap: 6px; }
    .col-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; }
    @media (max-width: 600px) { .col-grid { grid-template-columns: repeat(4, 1fr); } }
    .col-chip { display: flex; align-items: center; justify-content: center; padding: 7px 4px; border-radius: 8px; font-size: 12px; border: 1.5px solid #e2e8f0; background: white; cursor: pointer; transition: all 0.15s; user-select: none; color: #4a5568; text-align: center; line-height: 1.3; min-height: 40px; word-break: break-all; }
    .col-chip.active { background: #ebf8ff; border-color: #4299e1; color: #2b6cb0; font-weight: 500; }
    .col-chip:hover { border-color: #bee3f8; background: #f0f9ff; }
    .col-chip.active:hover { background: #dbeafe; }

    .results-card { background: white; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; display: none; }
    .results-header { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
    .results-header h3 { font-size: 14px; font-weight: 600; color: #2d3748; }
    .count-badge { background: #ebf8ff; color: #2b6cb0; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th { background: #f7fafc; padding: 9px 12px; text-align: left; font-weight: 600; font-size: 12px; color: #4a5568; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
    tbody tr:hover { background: #f7fafc; }
    tbody td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #2d3748; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; cursor: pointer; transition: background 0.1s; }
    tbody td:hover { background: #ebf8ff; color: #2b6cb0; }
    tbody tr:last-child td { border-bottom: none; }
    mark { background: #fefcbf; color: #744210; border-radius: 2px; padding: 0 2px; }
    .empty-state { text-align: center; padding: 40px; color: #a0aec0; }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
    .click-hint { font-size: 11px; color: #a0aec0; text-align: center; padding: 10px; }
    .spinner { display: inline-block; width: 15px; height: 15px; border: 2px solid #e2e8f0; border-top-color: #3182ce; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 5px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .popup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .popup-overlay.show { display: flex; }
    .popup-box { background: white; border-radius: 14px; padding: 20px; width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
    .popup-label { font-size: 12px; font-weight: 600; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .popup-content { font-size: 15px; color: #1a202c; line-height: 1.6; word-break: break-all; background: #f7fafc; border-radius: 8px; padding: 12px 14px; margin-bottom: 16px; min-height: 48px; white-space: pre-wrap; }
    .popup-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-copy { background: #3182ce; color: white; padding: 8px 18px; border: none; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; }
    .btn-copy:hover { background: #2b6cb0; }
    .btn-copy.copied { background: #38a169; }
    .btn-close-popup { background: #f7fafc; color: #4a5568; padding: 8px 18px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 13px; font-family: 'Noto Sans TC', sans-serif; font-weight: 500; cursor: pointer; }
    .btn-close-popup:hover { background: #edf2f7; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>🚌 城市車旅場站資料搜尋工具</h1>
    <p>快速搜尋 Google 試算表中的任何資料</p>
  </header>

  <div class="switcher">
    <button class="switch-btn active" onclick="switchSheet('station')">📊 場站總表</button>
    <button class="switch-btn" onclick="switchSheet('repair')">🔧 報修系統</button>
  </div>

  <div class="sheet-tabs" id="repairTabs">
    <div class="sheet-tab active" data-sheet="阜爾報修(未完成)">阜爾報修(未完成)</div>
    <div class="sheet-tab" data-sheet="中控叫修(未完成)">中控叫修(未完成)</div>
    <div class="sheet-tab" data-sheet="阜爾報修(當日完成)">阜爾報修(當日完成)</div>
    <div class="sheet-tab" data-sheet="中控報修(當日完成)">中控報修(當日完成)</div>
    <div class="sheet-tab" data-sheet="阜爾報修(歷史留存)">阜爾報修(歷史留存)</div>
    <div class="sheet-tab" data-sheet="中控報修(歷史留存)">中控報修(歷史留存)</div>
    <div class="sheet-tab" data-sheet="阜爾報修(切換歷史留存)">阜爾報修(切換歷史留存)</div>
    <div class="sheet-tab" data-sheet="中控叫修(切換歷史留存)">中控叫修(切換歷史留存)</div>
  </div>

  <div class="card">
    <div class="col-selector" id="colSelector">
      <h4>
        顯示欄位（選好後再按搜尋）
        <span class="col-actions">
          <button class="btn btn-sm btn-outline" onclick="selectAll()">全選</button>
          <button class="btn btn-sm btn-outline" onclick="selectNone()">全不選</button>
        </span>
      </h4>
      <div class="col-grid" id="colGrid"></div>
    </div>
    <div style="margin-top:16px">
      <input class="search-input" type="text" id="keyword"
        placeholder="輸入關鍵字搜尋..." onkeydown="if(event.key==='Enter') doSearch()" disabled>
      <button class="btn btn-primary" id="searchBtn" onclick="doSearch()" disabled>搜尋</button>
      <div class="status" id="status">請點上方按鈕選擇試算表，系統會自動載入</div>
    </div>
  </div>

  <div class="results-card" id="resultsCard">
    <div class="results-header">
      <h3>搜尋結果</h3>
      <span class="count-badge" id="countBadge">0 筆</span>
    </div>
    <div class="table-wrap" id="tableWrap"></div>
    <div class="click-hint">點擊任意欄位可查看完整內容並複製</div>
  </div>
</div>

<div class="popup-overlay" id="popupOverlay">
  <div class="popup-box">
    <div class="popup-label" id="popupLabel"></div>
    <div class="popup-content" id="popupContent"></div>
    <div class="popup-actions">
      <button class="btn-close-popup" onclick="closePopupDirect()">關閉</button>
      <button class="btn-copy" id="copyBtn" onclick="copyContent()">複製</button>
    </div>
  </div>
</div>

<script>
  const SHEETS = {
    station: { id: '1gq0qZzwbKZY7uLzpKwEmcFAr4D3SUttcTwWqkaOTAKY', sheet: '總表', defaultCols: ['公司','場地代號','縣市','區域','淡大名稱','場地地址','派工保全'] },
    repair:  { id: '1Lq0ZoG9s4iNqNeBJcpQGhjQV9ZqIBVeEqe9LcZWjkCI', sheet: '阜爾報修(未完成)', defaultCols: [] }
  };

  let currentMode = 'station';
  let allData = [], headers = [], activeHeaders = new Set();
  let currentCopyText = '';

  // 分頁標籤點擊
  document.querySelectorAll('.sheet-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      SHEETS.repair.sheet = tab.dataset.sheet;
      resetResults();
      loadSheet();
    });
  });

  // 彈出視窗點擊背景關閉
  document.getElementById('popupOverlay').addEventListener('click', function(e) {
    if (e.target === this) closePopupDirect();
  });

  // 表格點擊事件（用事件委派，避免特殊字元問題）
  document.getElementById('tableWrap').addEventListener('click', function(e) {
    const td = e.target.closest('td');
    if (!td) return;
    const label = td.dataset.label || '';
    const value = td.dataset.value || '';
    openPopup(label, value);
  });

  window.onload = () => loadSheet();

  function switchSheet(mode) {
    if (currentMode === mode) return;
    currentMode = mode;
    document.querySelectorAll('.switch-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && mode === 'station') || (i === 1 && mode === 'repair'));
    });
    document.getElementById('repairTabs').classList.toggle('show', mode === 'repair');
    resetResults();
    loadSheet();
  }

  function resetResults() {
    allData = []; headers = []; activeHeaders = new Set();
    document.getElementById('colSelector').style.display = 'none';
    document.getElementById('colGrid').innerHTML = '';
    document.getElementById('resultsCard').style.display = 'none';
    document.getElementById('keyword').disabled = true;
    document.getElementById('searchBtn').disabled = true;
    document.getElementById('keyword').value = '';
  }

  async function loadSheet() {
    const cfg = SHEETS[currentMode];
    const csvUrl = `https://docs.google.com/spreadsheets/d/${cfg.id}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(cfg.sheet)}`;
    setStatus('<span class="spinner"></span>載入中...', '');
    try {
      const res = await fetch(csvUrl);
      if (!res.ok) throw new Error('無法讀取試算表，請確認共用設定為「知道連結的任何人可以查看」');
      parseCSV(await res.text(), cfg.defaultCols);
    } catch (e) {
      setStatus('❌ ' + e.message, 'error');
    }
  }

  function parseCSV(text, defaultCols) {
    const rows = [];
    let current = '', inQuotes = false, row = [];
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (ch === '"') {
        if (inQuotes && text[i+1] === '"') { current += '"'; i++; }
        else inQuotes = !inQuotes;
      } else if (ch === ',' && !inQuotes) { row.push(current); current = ''; }
      else if ((ch === '\n' || ch === '\r') && !inQuotes) {
        if (current || row.length) { row.push(current); rows.push(row); }
        current = ''; row = [];
        if (ch === '\r' && text[i+1] === '\n') i++;
      } else current += ch;
    }
    if (current || row.length) { row.push(current); rows.push(row); }
    if (!rows.length) { setStatus('❌ 試算表是空的', 'error'); return; }

    const rawHeaders = rows[0].map(h => h.replace(/^"|"$/g, '').trim());
    const validIndexes = rawHeaders.map((h, i) => h ? i : -1).filter(i => i >= 0);
    headers = validIndexes.map(i => rawHeaders[i]);

    allData = rows.slice(1).map(r =>
      headers.reduce((obj, h, idx) => {
        obj[h] = (r[validIndexes[idx]] || '').replace(/^"|"$/g, '').trim();
        return obj;
      }, {})
    );

    activeHeaders = defaultCols.length > 0
      ? new Set(headers.filter(h => defaultCols.includes(h)))
      : new Set(headers);
    if (activeHeaders.size === 0) activeHeaders = new Set(headers);

    renderColChips();
    setStatus(`✅ 已載入 ${allData.length} 筆資料（${headers.length} 個欄位）— 選好欄位後按搜尋`, 'success');
    document.getElementById('keyword').disabled = false;
    document.getElementById('searchBtn').disabled = false;
    document.getElementById('colSelector').style.display = 'block';
    document.getElementById('keyword').focus();
  }

  function renderColChips() {
    const grid = document.getElementById('colGrid');
    grid.innerHTML = '';
    headers.forEach(h => {
      const chip = document.createElement('div');
      chip.className = 'col-chip' + (activeHeaders.has(h) ? ' active' : '');
      chip.textContent = h;
      chip.addEventListener('click', () => {
        if (activeHeaders.has(h)) {
          if (activeHeaders.size <= 1) return;
          activeHeaders.delete(h);
          chip.classList.remove('active');
        } else {
          activeHeaders.add(h);
          chip.classList.add('active');
        }
      });
      grid.appendChild(chip);
    });
  }

  function selectAll() { activeHeaders = new Set(headers); renderColChips(); }
  function selectNone() { activeHeaders = new Set([headers[0]]); renderColChips(); }

  function doSearch() {
    const kw = document.getElementById('keyword').value.trim();
    const kwLower = kw.toLowerCase();
    const found = kw ? allData.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(kwLower))) : allData;
    showResults(found, kw);
  }

  function showResults(rows, kw) {
    document.getElementById('resultsCard').style.display = 'block';
    document.getElementById('countBadge').textContent = rows.length + ' 筆';
    const visibleHeaders = headers.filter(h => activeHeaders.has(h));
    const wrap = document.getElementById('tableWrap');
    if (!rows.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>找不到符合「${escHtml(kw)}」的資料</p></div>`;
      return;
    }

    const tbody = document.createElement('tbody');
    rows.forEach(r => {
      const tr = document.createElement('tr');
      visibleHeaders.forEach(h => {
        const td = document.createElement('td');
        const v = String(r[h] ?? '');
        td.dataset.label = h;
        td.dataset.value = v;
        td.innerHTML = highlight(v, kw);
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    const table = document.createElement('table');
    const thead = document.createElement('thead');
    thead.innerHTML = '<tr>' + visibleHeaders.map(h => `<th>${escHtml(h)}</th>`).join('') + '</tr>';
    table.appendChild(thead);
    table.appendChild(tbody);
    wrap.innerHTML = '';
    wrap.appendChild(table);

    setStatus(`找到 ${rows.length} 筆符合「${escHtml(kw)}」的資料`, 'success');
  }

  function openPopup(label, content) {
    currentCopyText = content;
    document.getElementById('popupLabel').textContent = label;
    document.getElementById('popupContent').textContent = content || '（空白）';
    document.getElementById('copyBtn').textContent = '複製';
    document.getElementById('copyBtn').classList.remove('copied');
    document.getElementById('popupOverlay').classList.add('show');
  }

  function closePopupDirect() {
    document.getElementById('popupOverlay').classList.remove('show');
  }

  function copyContent() {
    navigator.clipboard.writeText(currentCopyText).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '已複製！';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = '複製'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function highlight(text, kw) {
    if (!kw) return escHtml(text);
    return escHtml(text).replace(new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), m => '<mark>' + m + '</mark>');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.innerHTML = msg;
    el.className = 'status ' + (type || '');
  }
</script>
</body>
</html>
